<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频下载器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 480px; margin: 0 auto; padding-top: 30px; }
        .logo { text-align: center; margin-bottom: 20px; color: #fff; }
        .logo .icon { font-size: 56px; }
        .logo h1 { font-size: 26px; margin: 8px 0; }
        .status-bar { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,.25);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin: 2px;
        }
        .badge.available { background: #28a745; }
        .badge.unavailable { background: #dc3545; }
        .badge.version { background: rgba(255,255,255,.25); }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
        }
        label { display: block; color: #666; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        input[type=text] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            margin-bottom: 12px;
        }
        input:focus { outline: none; border-color: #667eea; }
        .row { display: flex; gap: 8px; margin-bottom: 16px; }
        .row button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #f0f0f0;
            cursor: pointer;
            font-size: 14px;
        }
        .row button:hover { background: #e0e0e0; }
        .btn-primary {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: none;
        }
        .quality-group { display: none; margin-bottom: 16px; }
        .quality-group.show { display: block; }
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
        }
        .result {
            display: none;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            line-height: 1.6;
        }
        .result.show { display: block; }
        .result.ok { background: #e8f5e9; color: #2e7d32; }
        .result.err { background: #ffebee; color: #c62828; }
        .video-info { display: flex; gap: 12px; margin-top: 8px; }
        .video-info img {
            width: 72px; height: 72px;
            border-radius: 8px; object-fit: cover;
            background: #eee;
        }
        .video-info .placeholder {
            width: 72px; height: 72px;
            border-radius: 8px;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .video-title { font-weight: 600; word-break: break-all; }
        .video-meta { font-size: 12px; color: #888; margin-top: 4px; }
        .btn-dl {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 18px;
            background: #4caf50;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,.85);
            font-size: 12px;
        }
        .loading {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="icon">📥</div>
            <h1>视频下载器</h1>
            <div class="status-bar">
                <span class="badge version" id="version">v2.0.3</span>
                <span class="badge" id="nodeStatus">🔄 检测中...</span>
                <span class="badge" id="ytdlpStatus">🔄 检测中...</span>
            </div>
        </div>

        <div class="card">
            <label for="url">视频链接</label>
            <input type="text" id="url" placeholder="粘贴抖音、B站、YouTube 等视频链接">
            <div class="row">
                <button type="button" onclick="pasteUrl()">粘贴</button>
                <button type="button" onclick="clearAll()">清空</button>
            </div>

            <div class="quality-group" id="qualityGroup">
                <label for="quality">画质</label>
                <select id="quality"></select>
            </div>

            <button class="btn-primary" id="parseBtn" onclick="parseVideo()">
                <span id="parseText">解析视频</span>
            </button>
            <button class="btn-secondary" id="downloadBtn" onclick="downloadVideo()">
                <span id="dlText">下载视频</span>
            </button>

            <div class="result" id="result"><div id="resultBody"></div></div>
        </div>

        <div class="footer">
            <p>基于 yt-dlp 支持多平台视频下载</p>
        </div>
    </div>

    <script>
        function showResult(html, type) {
            const box = document.getElementById('result');
            document.getElementById('resultBody').innerHTML = html;
            box.className = 'result show ' + type;
        }

        async function pasteUrl() {
            try {
                document.getElementById('url').value = await navigator.clipboard.readText();
            } catch (e) {
                document.getElementById('url').focus();
            }
        }

        function clearAll() {
            document.getElementById('url').value = '';
            document.getElementById('result').className = 'result';
            document.getElementById('qualityGroup').classList.remove('show');
            document.getElementById('downloadBtn').style.display = 'none';
        }

        function populateQuality(qualities, def) {
            const sel = document.getElementById('quality');
            sel.innerHTML = '';
            const opts = [{ v: 'best', l: '最佳画质' }];
            (qualities || []).forEach(q => opts.push({ v: String(q), l: String(q) + 'P' }));
            const seen = new Set();
            opts.forEach(o => {
                if (seen.has(o.v)) return;
                seen.add(o.v);
                const op = document.createElement('option');
                op.value = o.v;
                op.textContent = o.l;
                if (String(def) === o.v) op.selected = true;
                sel.appendChild(op);
            });
            document.getElementById('qualityGroup').classList.add('show');
        }

        async function parseVideo() {
            const url = document.getElementById('url').value.trim();
            if (!url) { showResult('<p>请输入视频链接</p>', 'err'); return; }

            const btn = document.getElementById('parseBtn');
            const txt = document.getElementById('parseText');
            btn.disabled = true;
            txt.innerHTML = '<span class="loading"></span>解析中...';

            try {
                const r = await fetch('/api/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const d = await r.json();
                if (d.success) {
                    let thumbHtml = '<div class="placeholder">📹</div>';
                    if (d.thumbnail && d.thumbnail.startsWith('http')) {
                        thumbHtml = '<img src="' + d.thumbnail + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" />' +
                                    '<div class="placeholder" style="display:none">📹</div>';
                    }
                    showResult(
                        '<div class="video-info">' + thumbHtml +
                        '<div><div class="video-title">' + escapeHtml(d.title) + '</div>' +
                        (d.author ? '<div class="video-meta">作者: ' + escapeHtml(d.author) + '</div>' : '') +
                        (d.siteType ? '<div class="video-meta">平台: ' + escapeHtml(d.siteType) + '</div>' : '') +
                        '</div></div>', 'ok');
                    populateQuality(d.qualities, d.defaultQuality);
                    document.getElementById('downloadBtn').style.display = 'block';
                } else {
                    showResult('<p>' + (d.error || '解析失败') + '</p>', 'err');
                }
            } catch (e) {
                showResult('<p>网络错误</p>', 'err');
            } finally {
                btn.disabled = false;
                txt.textContent = '解析视频';
            }
        }

        async function downloadVideo() {
            const url = document.getElementById('url').value.trim();
            const quality = document.getElementById('quality').value;
            const btn = document.getElementById('downloadBtn');
            const txt = document.getElementById('dlText');
            btn.disabled = true;
            txt.innerHTML = '<span class="loading"></span>下载中...';

            try {
                const r = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, quality })
                });
                const d = await r.json();
                if (d.success) {
                    const mb = (d.fileSize / 1024 / 1024).toFixed(2);
                    showResult(
                        document.getElementById('resultBody').innerHTML +
                        '<p style="margin-top:10px">大小: ' + mb + ' MB</p>' +
                        '<a class="btn-dl" href="' + d.videoUrl + '" download>📥 保存视频</a>', 'ok');
                } else {
                    showResult('<p>' + (d.error || '下载失败') + '</p>', 'err');
                }
            } catch (e) {
                showResult('<p>网络错误</p>', 'err');
            } finally {
                btn.disabled = false;
                txt.textContent = '下载视频';
            }
        }

        function escapeHtml(t) {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        async function initApp() {
            try {
                const r = await fetch('/api/version');
                const d = await r.json();
                document.getElementById('version').textContent = d.version || 'v2.0.3';

                const nodeEl = document.getElementById('nodeStatus');
                if (d.node_available) {
                    nodeEl.textContent = '✅ Node.js ' + (d.node_version || '');
                    nodeEl.className = 'badge available';
                } else {
                    nodeEl.textContent = '❌ Node.js 未安装';
                    nodeEl.className = 'badge unavailable';
                }

                const ytdlpEl = document.getElementById('ytdlpStatus');
                if (d.ytdlp_version) {
                    ytdlpEl.textContent = '✅ yt-dlp ' + d.ytdlp_version;
                    ytdlpEl.className = 'badge available';
                } else {
                    ytdlpEl.textContent = '❌ yt-dlp 未知';
                    ytdlpEl.className = 'badge unavailable';
                }
            } catch (e) {
                document.getElementById('nodeStatus').textContent = '❌ 检测失败';
                document.getElementById('ytdlpStatus').textContent = '❌ 检测失败';
            }
        }

        document.getElementById('url').addEventListener('keypress', e => {
            if (e.key === 'Enter') parseVideo();
        });

        initApp();
    </script>
</body>
</html>
