<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频下载器 - 支持抖音、YouTube等1000+网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding-top: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo .icon {
            font-size: 64px;
            margin-bottom: 15px;
        }

        .logo h1 {
            color: white;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .version-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .node-status {
            display: inline-block;
            margin-left: 8px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
        }

        .node-status.available {
            background: rgba(76, 175, 80, 0.8);
            color: white;
        }

        .node-status.unavailable {
            background: rgba(244, 67, 54, 0.8);
            color: white;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .input-group-row {
            display: flex;
            gap: 10px;
        }

        .input-group-row button {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-paste {
            background: #f0f0f0;
            color: #666;
        }

        .btn-paste:hover {
            background: #e0e0e0;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #666;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .btn-download {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-download:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
        }

        .result.success {
            background: #e8f5e9;
            border: 1px solid #c8e6c9;
        }

        .result.error {
            background: #ffebee;
            border: 1px solid #ffcdd2;
        }

        .result.warning {
            background: #fff8e1;
            border: 1px solid #ffecb3;
        }

        .result.show {
            display: block;
        }

        .result p {
            font-size: 14px;
            line-height: 1.6;
        }

        .result.success p {
            color: #2e7d32;
        }

        .result.error p {
            color: #c62828;
        }

        .result.warning p {
            color: #f57c00;
        }

        .video-info {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .video-thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .video-thumbnail.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .video-details {
            flex: 1;
        }

        .video-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 14px;
            word-break: break-all;
        }

        .video-author {
            font-size: 12px;
            color: #999;
        }

        .video-size {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }

        .btn-download-video {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-download-video:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }

        .tutorial {
            background: #f1f8e9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .tutorial h3 {
            color: #388e3c;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .tutorial ol {
            padding-left: 20px;
        }

        .tutorial li {
            color: #555;
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .supported-sites {
            background: #e3f2fd;
            border-radius: 12px;
            padding: 20px;
        }

        .supported-sites h3 {
            color: #1976d2;
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .site-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .site-tag {
            background: rgba(255, 255, 255, 0.8);
            color: #1976d2;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .site-tag.more {
            background: rgba(255, 255, 255, 0.5);
        }

        .tips {
            background: #fff3e0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #ff9800;
        }

        .tips p {
            color: #e65100;
            font-size: 13px;
            line-height: 1.5;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
        }

        .footer a {
            color: white;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .thumbnail-container {
            position: relative;
        }

        .thumbnail-loading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
        }

        .thumbnail-loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }

        .thumbnail-error {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="icon">📥</div>
            <h1>视频下载器</h1>
            <div class="version-badge" id="version">v1.4.0</div>
            <div class="node-status" id="nodeStatus">Node.js: 检测中...</div>
        </div>

        <div class="card">
            <div class="input-group">
                <label for="url">视频链接</label>
                <div class="input-group-row">
                    <input type="text" id="url" placeholder="粘贴抖音、YouTube、B站等视频链接">
                    <button class="btn-paste" onclick="pasteUrl()">粘贴</button>
                    <button class="btn-clear" onclick="clearUrl()">清空</button>
                </div>
            </div>

            <button class="btn-download" id="downloadBtn" onclick="downloadVideo()">
                <span id="btnText">解析视频</span>
            </button>

            <div class="result" id="result">
                <div id="resultContent"></div>
            </div>

            <div class="tips">
                <p>💡 提示：部分视频网站（如抖音）部分内容可能需要登录才能下载。</p>
            </div>

            <div class="tutorial">
                <h3>📖 使用教程</h3>
                <ol>
                    <li>打开视频网站，找到想要下载的视频</li>
                    <li>点击分享按钮，选择"复制链接"</li>
                    <li>回到本页面，粘贴链接并点击解析</li>
                    <li>点击下载按钮，保存视频到相册</li>
                </ol>
            </div>

            <div class="supported-sites">
                <h3>🌐 支持的网站</h3>
                <div class="site-tags">
                    <span class="site-tag">抖音</span>
                    <span class="site-tag">YouTube</span>
                    <span class="site-tag">B站</span>
                    <span class="site-tag">快手</span>
                    <span class="site-tag">微博</span>
                    <span class="site-tag">小红书</span>
                    <span class="site-tag">TikTok</span>
                    <span class="site-tag more">更多...</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>基于 yt-dlp | 支持 1000+ 视频网站 | 仅用于个人学习</p>
        </div>
    </div>

    <script>
        async function pasteUrl() {
            const input = document.getElementById('url');
            try {
                const text = await navigator.clipboard.readText();
                input.value = text;
                input.focus();
            } catch (err) {
                input.focus();
            }
        }

        function clearUrl() {
            document.getElementById('url').value = '';
            document.getElementById('result').classList.remove('show', 'success', 'error', 'warning');
            document.getElementById('url').focus();
        }

        function formatFileSize(bytes) {
            if (bytes === undefined || bytes === null) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        async function downloadVideo() {
            const url = document.getElementById('url').value.trim();
            const btn = document.getElementById('downloadBtn');
            const btnText = document.getElementById('btnText');
            const result = document.getElementById('result');
            const resultContent = document.getElementById('resultContent');

            if (!url) {
                result.innerHTML = '<p>请输入视频链接</p>';
                result.className = 'result error show';
                return;
            }

            btn.disabled = true;
            btnText.innerHTML = '<span class="loading"></span>解析中...';
            result.className = 'result';

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (data.success) {
                    let thumbnailHtml = '';
                    if (data.thumbnail && data.thumbnail.startsWith('http')) {
                        thumbnailHtml = `
                            <div class="thumbnail-container">
                                <img src="${data.thumbnail}" class="video-thumbnail" 
                                     onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\'video-thumbnail thumbnail-error\'>📷</div>';" />
                            </div>
                        `;
                    } else {
                        thumbnailHtml = '<div class="video-thumbnail placeholder">📷</div>';
                    }

                    let html = `
                        <div class="video-info">
                            ${thumbnailHtml}
                            <div class="video-details">
                                <div class="video-title">${escapeHtml(data.title || '视频')}</div>
                                ${data.author ? '<div class="video-author">作者: ' + escapeHtml(data.author) + '</div>' : ''}
                                ${data.fileSize ? '<div class="video-size">大小: ' + formatFileSize(data.fileSize) + '</div>' : ''}
                            </div>
                        </div>
                        <a href="${data.videoUrl}" class="btn-download-video" download>📥 下载视频</a>
                    `;
                    resultContent.innerHTML = html;
                    result.className = 'result success show';
                } else {
                    let errorMsg = data.error || '下载失败';
                    let isWarning = errorMsg.includes('⚠️');
                    resultContent.innerHTML = '<p>' + errorMsg + '</p>';
                    result.className = isWarning ? 'result warning show' : 'result error show';
                }
            } catch (error) {
                resultContent.innerHTML = '<p>网络错误，请稍后重试</p>';
                result.className = 'result error show';
            } finally {
                btn.disabled = false;
                btnText.innerHTML = '解析视频';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('url').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                downloadVideo();
            }
        });

        async function checkVersion() {
            try {
                const response = await fetch('/api/version');
                const data = await response.json();
                document.getElementById('version').textContent = data.version;
                
                const nodeStatus = document.getElementById('nodeStatus');
                if (data.node_available) {
                    nodeStatus.textContent = '✅ Node.js 已就绪';
                    nodeStatus.className = 'node-status available';
                } else {
                    nodeStatus.textContent = '❌ Node.js 未配置';
                    nodeStatus.className = 'node-status unavailable';
                }
            } catch (e) {
                console.log('无法获取版本信息');
            }
        }

        checkVersion();
    </script>
</body>
</html>
