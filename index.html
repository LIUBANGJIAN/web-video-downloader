<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频下载器 - 支持抖音、YouTube等1000+网站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding-top: 60px;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
      margin: 0 auto;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .logo h1 {
      color: white;
      font-size: 24px;
      margin-top: 15px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .version-badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 12px;
      margin-top: 8px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      color: #333;
      font-size: 14px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
    }

    .input-wrapper input {
      flex: 1;
      padding: 15px;
      border: 2px solid #eee;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.3s ease;
      outline: none;
    }

    .input-wrapper input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 15px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 15px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%);
    }

    .btn-secondary:hover {
      box-shadow: 0 5px 20px rgba(100, 116, 139, 0.4);
    }

    .btn-sm {
      flex: 0 0 auto;
      padding: 15px 20px;
      font-size: 14px;
    }

    .result {
      display: none;
      margin-top: 25px;
      padding-top: 25px;
      border-top: 1px solid #eee;
    }

    .result.show {
      display: block;
    }

    .video-info {
      margin-bottom: 20px;
    }

    .video-cover {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .video-title {
      color: #333;
      font-size: 16px;
      margin-bottom: 8px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-author {
      color: #999;
      font-size: 14px;
    }

    .download-btn {
      display: inline-block;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      transition: all 0.3s ease;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(16, 185, 129, 0.4);
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      display: none;
      background: #fff5f5;
      border: 1px solid #ffe5e5;
      color: #dc2626;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      font-size: 14px;
    }

    .error.show {
      display: block;
    }

    .tips {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
      font-size: 14px;
      line-height: 1.6;
    }

    .tips h3 {
      font-size: 14px;
      margin-bottom: 10px;
    }

    .tips ul {
      padding-left: 20px;
    }

    .tips li {
      margin-bottom: 5px;
    }

    .supported-sites {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e40af;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      font-size: 13px;
    }

    .supported-sites h3 {
      font-size: 13px;
      margin-bottom: 8px;
    }

    .site-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .site-tag {
      background: #dbeafe;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="icon">📥</div>
      <h1>视频下载器</h1>
      <div class="version-badge" id="version">v1.3.3</div>
    </div>

    <div class="card">
      <div class="input-group">
        <label for="url">视频链接</label>
        <div class="input-wrapper">
          <input type="text" id="url" placeholder="粘贴抖音、YouTube、B站等视频链接">
          <button class="btn btn-sm btn-secondary" id="pasteBtn">粘贴</button>
          <button class="btn btn-sm btn-secondary" id="clearBtn">清空</button>
        </div>
      </div>

      <button class="btn" id="parseBtn">解析视频</button>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>正在解析中...</p>
      </div>

      <div class="error" id="error"></div>

      <div class="result" id="result">
        <div class="video-info">
          <img class="video-cover" id="cover" src="" alt="视频封面">
          <div class="video-title" id="title"></div>
          <div class="video-author" id="author"></div>
        </div>
        <a class="download-btn" id="downloadBtn" href="#" download>下载视频</a>
      </div>

      <div class="tips">
        <h3>📱 使用教程</h3>
        <ul>
          <li>1. 打开视频网站，找到想要下载的视频</li>
          <li>2. 点击分享按钮，选择"复制链接"</li>
          <li>3. 回到本页面，点击粘贴按钮或手动粘贴链接</li>
          <li>4. 点击解析按钮，然后点击下载保存视频</li>
        </ul>
      </div>

      <div class="supported-sites">
        <h3>🌐 支持的网站</h3>
        <div class="site-tags">
          <span class="site-tag">抖音</span>
          <span class="site-tag">YouTube</span>
          <span class="site-tag">B站</span>
          <span class="site-tag">快手</span>
          <span class="site-tag">微博</span>
          <span class="site-tag">小红书</span>
          <span class="site-tag">TikTok</span>
          <span class="site-tag">更多...</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>基于 yt-dlp | 支持1000+视频网站 | 仅用于个人学习</p>
    </div>
  </div>

  <script>
    const urlInput = document.getElementById('url');
    const parseBtn = document.getElementById('parseBtn');
    const pasteBtn = document.getElementById('pasteBtn');
    const clearBtn = document.getElementById('clearBtn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const result = document.getElementById('result');
    const cover = document.getElementById('cover');
    const title = document.getElementById('title');
    const author = document.getElementById('author');
    const downloadBtn = document.getElementById('downloadBtn');
    const versionBadge = document.getElementById('version');

    fetch('/api/version')
      .then(res => res.json())
      .then(data => {
        if (data.version) {
          versionBadge.textContent = data.version;
        }
      })
      .catch(() => {});

    pasteBtn.addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText();
        urlInput.value = text;
        hideError();
      } catch (err) {
        urlInput.focus();
      }
    });

    clearBtn.addEventListener('click', () => {
      urlInput.value = '';
      hideError();
      hideResult();
      urlInput.focus();
    });

    parseBtn.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      
      if (!url) {
        showError('请输入视频链接');
        return;
      }

      if (!isValidUrl(url)) {
        showError('请输入有效的视频链接');
        return;
      }

      hideError();
      showLoading();
      hideResult();

      try {
        const response = await fetch('/api/download', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ url })
        });

        const data = await response.json();

        if (data.success) {
          cover.src = data.thumbnail || `https://via.placeholder.com/480x270?text=${encodeURIComponent(data.title)}`;
          title.textContent = data.title || '视频';
          author.textContent = data.author ? `作者: ${data.author}` : '';
          downloadBtn.href = data.videoUrl;
          downloadBtn.download = `${data.title || '视频'}.${data.ext || 'mp4'}`;
          
          if (data.version) {
            versionBadge.textContent = data.version;
          }
          
          hideLoading();
          showResult();
        } else {
          throw new Error(data.error || '未找到视频信息');
        }
      } catch (err) {
        hideLoading();
        showError(err.message || '解析失败，请稍后重试');
      }
    });

    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        parseBtn.click();
      }
    });

    function isValidUrl(string) {
      if (!string.includes('http')) return false;
      try {
        new URL(string);
        return true;
      } catch (_) {
        return /https?:\/\/[\w\-._~:/?#[\]@!$&'()*+,;=%]+/.test(string);
      }
    }

    function showLoading() {
      loading.classList.add('show');
      parseBtn.disabled = true;
    }

    function hideLoading() {
      loading.classList.remove('show');
      parseBtn.disabled = false;
    }

    function showError(msg) {
      error.textContent = msg;
      error.classList.add('show');
    }

    function hideError() {
      error.classList.remove('show');
    }

    function showResult() {
      result.classList.add('show');
    }

    function hideResult() {
      result.classList.remove('show');
    }
  </script>
</body>
</html>
