<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抖音视频下载器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 480px; margin: 0 auto; padding-top: 30px; }
        .logo { text-align: center; margin-bottom: 20px; color: #fff; }
        .logo .icon { font-size: 56px; }
        .logo h1 { font-size: 26px; margin: 8px 0; }
        .status-bar { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,.25);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin: 2px;
        }
        .badge.version { background: rgba(255,255,255,.25); }
        .badge.playwright { background: rgba(76,175,80,.8); color: #fff; }
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
        }
        label { display: block; color: #666; font-size: 14px; margin-bottom: 8px; font-weight: 500; }
        input[type=text] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            margin-bottom: 12px;
        }
        input:focus { outline: none; border-color: #667eea; }
        .row { display: flex; gap: 8px; margin-bottom: 16px; }
        .row button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #f0f0f0;
            cursor: pointer;
            font-size: 14px;
        }
        .row button:hover { background: #e0e0e0; }
        .btn-primary {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: none;
        }
        .result {
            display: none;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            line-height: 1.6;
        }
        .result.show { display: block; }
        .result.ok { background: #e8f5e9; color: #2e7d32; }
        .result.err { background: #ffebee; color: #c62828; }
        .video-info { display: flex; gap: 12px; margin-top: 8px; }
        .video-info img {
            width: 72px; height: 72px;
            border-radius: 8px; object-fit: cover;
            background: #eee;
        }
        .video-info .placeholder {
            width: 72px; height: 72px;
            border-radius: 8px;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .video-title { font-weight: 600; word-break: break-all; }
        .video-meta { font-size: 12px; color: #888; margin-top: 4px; }
        .btn-dl {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 18px;
            background: #4caf50;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-top: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .image-grid img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .image-grid img:hover {
            border-color: #667eea;
        }
        .image-grid img.selected {
            border-color: #4caf50;
        }
        .image-count {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            text-align: center;
        }
        .select-all {
            font-size: 12px;
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 4px;
            display: inline-block;
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,.85);
            font-size: 12px;
        }
        .loading {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="icon">📥</div>
            <h1>抖音视频下载器</h1>
            <div class="status-bar">
                <span class="badge version" id="version">v3.0.5</span>
                <span class="badge" id="backend">douyin-downloader</span>
                <span class="badge playwright" id="playwright">douyin-downloader ✓</span>
            </div>
        </div>

        <div class="card">
            <label for="url">抖音链接</label>
            <input type="text" id="url" placeholder="粘贴抖音视频或图文链接">
            <div class="row">
                <button type="button" onclick="pasteUrl()">粘贴</button>
                <button type="button" onclick="clearAll()">清空</button>
            </div>

            <button class="btn-primary" id="parseBtn" onclick="parseVideo()">
                <span id="parseText">解析链接</span>
            </button>
            <button class="btn-secondary" id="downloadBtn" onclick="downloadItem()">
                <span id="dlText">下载</span>
            </button>

            <div class="result" id="result"><div id="resultBody"></div></div>
        </div>

        <div class="footer">
            <p>基于 douyin-downloader 实现 · 支持视频和图文</p>
        </div>
    </div>

    <script>
        let currentType = 'video';
        let currentUrl = '';
        let currentTitle = '';

        function showResult(html, type) {
            const box = document.getElementById('result');
            const body = document.getElementById('resultBody');
            body.innerHTML = html;
            box.className = 'result show ' + type;
        }

        async function parseVideo() {
            const url = document.getElementById('url').value.trim();
            if (!url) {
                showResult('请输入抖音链接', 'err');
                return;
            }

            const btn = document.getElementById('parseBtn');
            const text = document.getElementById('parseText');
            btn.disabled = true;
            text.innerHTML = '<span class="loading"></span>解析中...';

            try {
                const response = await fetch('/api/parse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (data.success) {
                    currentType = data.type;
                    currentUrl = data.video_url || data.image_url_list?.[0] || '';
                    currentTitle = data.title || '抖音视频';

                    if (data.type === 'video') {
                        showResult(`
                            <div class="video-info">
                                ${data.thumbnail ? `<img src="${data.thumbnail}" alt="封面">` : '<div class="placeholder">📹</div>'}
                                <div>
                                    <div class="video-title">${data.title || '视频'}</div>
                                    <div class="video-meta">作者: ${data.author || '未知'}</div>
                                </div>
                            </div>
                            <a class="btn-dl" href="#" onclick="downloadItem(); return false;">保存视频</a>
                        `, 'ok');
                    } else if (data.type === 'image' && data.image_url_list) {
                        showResult(`
                            <div class="video-title">${data.title || '图文'}</div>
                            <div class="video-meta">作者: ${data.author || '未知'} · ${data.image_url_list.length}张图片</div>
                            <div class="image-grid">
                                ${data.image_url_list.map((img, i) => `<img src="${img}" onclick="previewImage('${img}')">`).join('')}
                            </div>
                            <a class="btn-dl" href="#" onclick="downloadItem(); return false;">保存全部图片</a>
                        `, 'ok');
                    }

                    document.getElementById('downloadBtn').style.display = 'block';
                } else {
                    showResult(data.message || '解析失败', 'err');
                }
            } catch (error) {
                showResult('解析失败: ' + error.message, 'err');
            } finally {
                btn.disabled = false;
                text.innerHTML = '解析链接';
            }
        }

        async function downloadItem() {
            const url = document.getElementById('url').value.trim();
            if (!url) return;

            const btn = document.getElementById('downloadBtn');
            const text = document.getElementById('dlText');
            btn.disabled = true;
            text.innerHTML = '<span class="loading"></span>下载中...';

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (data.success) {
                    showResult(`下载成功！<a href="/download/${data.filename}" download>点击下载</a>`, 'ok');
                } else {
                    showResult(data.message || '下载失败', 'err');
                }
            } catch (error) {
                showResult('下载失败: ' + error.message, 'err');
            } finally {
                btn.disabled = false;
                text.innerHTML = '下载';
            }
        }

        function pasteUrl() {
            navigator.clipboard.readText().then(text => {
                document.getElementById('url').value = text;
            }).catch(() => {
                alert('无法访问剪贴板，请手动粘贴');
            });
        }

        function clearAll() {
            document.getElementById('url').value = '';
            document.getElementById('result').className = 'result';
            document.getElementById('downloadBtn').style.display = 'none';
        }

        async function initApp() {
            try {
                const r = await fetch('/api/version?' + Date.now());
                const d = await r.json();
                document.getElementById('version').textContent = d.version || 'v3.0.0';
                document.getElementById('backend').textContent = d.backend || 'douyin-downloader';
            } catch (e) {
                console.error('Failed to fetch version:', e);
            }
        }

        initApp();
    </script>
</body>
</html>
